<!doctype html><html><head><meta charset='utf-8'><title>色彩与形式构成实验台</title><script src='https://cdn.jsdelivr.net/npm/konva@9/konva.min.js'></script><style>body{font-family:sans-serif}.hidden{display:none}.cards{display:flex;gap:12px}.card{border:1px solid #ddd;padding:12px}.toolbar button{margin-right:6px}</style></head><body>
<h1>色彩与形式构成实验台</h1><button id='reuploadBtn'>重新上传作品</button><input id='fileInput' type='file' class='hidden'>
<div id='msg'></div>
<section id='idle'><button id='uploadBtn'>上传作品</button></section>
<section id='choose' class='hidden'><h2>上传成功</h2><p>你的作品已准备好。请选择本次实验方向。</p><img id='preview' width='300'><div class='cards'><div class='card'><h3>色彩实验</h3><button id='startColor'>开始色彩实验</button></div><div class='card'><h3>构图实验</h3><button id='startComp'>开始构图实验</button></div></div></section>
<section id='color' class='hidden'><button id='backChoose1'>返回实验选择</button><h3>主色区域选择</h3><div id='swatches'></div><button id='analyzeColor'>生成色彩实验反馈</button></section>
<section id='comp' class='hidden'><div class='toolbar'><button id='backChoose2'>返回实验选择</button><button id='flipX'>水平镜像</button><button id='flipY'>垂直镜像</button><button id='saveComp'>保存新图</button><button id='analyzeComp'>生成构图反馈</button></div><div id='stage'></div><p>拖动元素改变位置；拖动角点缩放；拖动上方圆点旋转；右键元素可调整图层顺序。</p><ul id='ops'></ul></section>
<script>
const API=location.origin; const S={status:'idle',uploaded:{},selectedExperiment:null,colorExperiment:{},compositionExperiment:{operations:[],layers:[]}};
const $=id=>document.getElementById(id); const msg=t=>$('msg').textContent=t||'';
function show(id){['idle','choose','color','comp'].forEach(x=>$(x).classList.toggle('hidden',x!==id));}
$('uploadBtn').onclick=()=>$('fileInput').click(); $('reuploadBtn').onclick=()=>$('fileInput').click();
$('fileInput').onchange=async()=>{const f=$('fileInput').files[0]; if(!f) return; S.status='uploading'; msg('正在上传作品……'); const fd=new FormData(); fd.append('file',f); const r=await fetch(API+'/upload-image',{method:'POST',body:fd}); const b=await r.json(); if(b.status!=='success') return msg('上传失败'); S.uploaded={imageId:null,originalImageUrl:b.original_image_url,displayUrl:b.display_url}; S.status='choosing_experiment'; $('preview').src=b.display_url; show('choose'); msg('上传成功，你的作品已准备好。请选择本次实验方向。'); }
$('startColor').onclick=async()=>{S.selectedExperiment='color'; S.status='color_processing'; msg('正在识别画面主要色块……'); const r=await fetch(API+'/segment',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({image_url:S.uploaded.originalImageUrl,color_count:4})}); const b=await r.json(); S.colorExperiment=b; show('color'); $('swatches').innerHTML=(b.color_regions||[]).map(x=>`<div>${x.name}</div>`).join('');}
let stage,layerNodes=[],selected;
$('startComp').onclick=async()=>{S.selectedExperiment='composition'; S.status='composition_processing'; msg('正在提取画面元素……'); const r=await fetch(API+'/layers/decompose',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({image_url:S.uploaded.displayUrl,max_layers:8})}); const b=await r.json(); S.compositionExperiment=b; show('comp'); msg(b.fallback_used?'当前为近似图层拆解，元素边界可能不完全准确，但可用于构图关系实验。':''); stage=new Konva.Stage({container:'stage',width:b.canvas.width,height:b.canvas.height}); const kLayer=new Konva.Layer(); stage.add(kLayer); for(const l of b.layers){ const img=new Image(); img.src=l.layer_url; await new Promise(res=>img.onload=res); const ki=new Konva.Image({image:img,x:l.transform.x,y:l.transform.y,draggable:true,name:l.id}); ki.on('dragend',()=>op('move',l.id,`你移动了${l.name}`)); ki.on('contextmenu',e=>{e.evt.preventDefault(); ki.moveToTop(); op('bring_to_front',l.id,`你将${l.name}置于顶层`); kLayer.draw();}); kLayer.add(ki); layerNodes.push({def:l,node:ki});} const tr=new Konva.Transformer(); kLayer.add(tr); stage.on('click',e=>{if(e.target===stage)return; selected=e.target; tr.nodes([selected]);}); kLayer.draw();}
function op(t,id,d){S.compositionExperiment.operations.push({type:t,layer_id:id,description:d}); $('ops').innerHTML=S.compositionExperiment.operations.map(x=>`<li>${x.description}</li>`).join('');}
$('flipX').onclick=()=>{if(!selected)return; selected.scaleX(selected.scaleX()*-1); selected.getLayer().draw(); op('flip_x',selected.name(),`你将${selected.name()}水平镜像`)}
$('flipY').onclick=()=>{if(!selected)return; selected.scaleY(selected.scaleY()*-1); selected.getLayer().draw(); op('flip_y',selected.name(),`你将${selected.name()}垂直镜像`)}
$('saveComp').onclick=async()=>{const layers=layerNodes.map((x,i)=>({id:x.def.id,layer_url:x.def.layer_url,x:x.node.x(),y:x.node.y(),scale_x:x.node.scaleX(),scale_y:x.node.scaleY(),rotation:x.node.rotation(),flip_x:x.node.scaleX()<0,flip_y:x.node.scaleY()<0,visible:x.node.visible(),opacity:x.node.opacity(),z_index:i+1})); const p={image_id:S.compositionExperiment.image_id,background_url:S.compositionExperiment.background_url,layers,operations:S.compositionExperiment.operations}; const r=await fetch(API+'/layers/compose',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)}); S.compositionExperiment.workingImageUrl=(await r.json()).after_image_url; op('save','-','你保存了构图实验图');}
$('analyzeComp').onclick=async()=>{const p={before_image_url:S.uploaded.displayUrl,after_image_url:S.compositionExperiment.workingImageUrl||S.uploaded.displayUrl,layers_before:S.compositionExperiment.layers,layers_after:[],operations:S.compositionExperiment.operations,user_goal:'用于形式构成课程实验'}; const r=await fetch(API+'/composition/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)}); const b=await r.json(); msg(b.message)}
$('analyzeColor').onclick=()=>msg('请继续使用原有色彩实验流程生成反馈。');
$('backChoose1').onclick=$('backChoose2').onclick=()=>show('choose');
</script></body></html>
