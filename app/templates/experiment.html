<!doctype html><html><head><meta charset='utf-8'><title>色彩与形式构成实验台</title>
<script src='https://cdn.jsdelivr.net/npm/konva@9/konva.min.js'></script><script src='https://cdn.jsdelivr.net/npm/marked/marked.min.js'></script><script src='https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js'></script>
<style>body{font-family:sans-serif}.hidden{display:none}#menu{position:absolute;background:#fff;border:1px solid #ddd;display:none;z-index:99}#menu button{display:block;width:180px}.cards{display:flex;gap:10px}.row{display:flex;gap:8px}canvas{border:1px solid #ddd}</style></head><body>
<h1>色彩与形式构成实验台</h1><input id='fileInput' type='file' class='hidden'><button id='uploadBtn'>上传作品</button><button id='reuploadBtn'>重新上传作品</button><div id='msg'></div>
<section id='choose' class='hidden'><h2>上传成功</h2><p>请选择本次实验方向</p><img id='preview' width='300'><div class='cards'><div><h3>色彩实验</h3><button id='startColor'>开始色彩实验</button></div><div><h3>构图实验</h3><button id='startComp'>开始构图实验</button></div></div></section>
<section id='color' class='hidden'><h3>色彩实验</h3><div class='row'><div><p>原图 canvas</p><canvas id='origCanvas'></canvas></div><div><p>预览 canvas</p><canvas id='previewCanvas'></canvas></div></div><div id='swatches'></div><div>H:<input id='h' type='range' min='-180' max='180'> S:<input id='s' type='range' min='-100' max='100'> L:<input id='l' type='range' min='-100' max='100'></div><button id='saveSwatch'>保存该色块调整 /recolor</button><button id='analyzeColor'>生成色彩反馈 /analyze</button><ul id='history'></ul><div id='colorFeedback'></div></section>
<section id='comp' class='hidden'><button id='saveComp'>保存新图</button><button id='analyzeComp'>生成构图反馈</button><div id='stage'></div><ul id='ops'></ul><div id='compFeedback'></div></section>
<div id='menu'></div>
<script>
const API=location.origin,S={uploaded:{},colorExperiment:{history:[]},compositionExperiment:{operations:[]}}; const $=x=>document.getElementById(x); const msg=t=>$('msg').textContent=t||'';
$('uploadBtn').onclick=$('reuploadBtn').onclick=()=>$('fileInput').click();
$('fileInput').onchange=async()=>{const f=$('fileInput').files[0];if(!f)return;const fd=new FormData();fd.append('file',f);const b=await (await fetch(API+'/upload-image',{method:'POST',body:fd})).json();S.uploaded={originalImageUrl:b.original_image_url,displayUrl:b.display_url};$('preview').src=b.display_url;$('choose').classList.remove('hidden')};
let regions=[],active;
$('startColor').onclick=async()=>{const b=await (await fetch(API+'/segment',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({image_url:S.uploaded.originalImageUrl,color_count:5})})).json();S.colorExperiment=b;regions=b.color_regions;$('color').classList.remove('hidden');$('swatches').innerHTML=regions.map(r=>`<button data-id="${r.id}" style="background:${r.hex}">${r.name}</button>`).join('');document.querySelectorAll('#swatches button').forEach(btn=>btn.onclick=()=>active=regions.find(r=>r.id===btn.dataset.id));const img=new Image();img.src=S.uploaded.displayUrl;img.onload=()=>{for(const id of ['origCanvas','previewCanvas']){$(id).width=img.width;$(id).height=img.height;$(id).getContext('2d').drawImage(img,0,0)}}};
async function doPreview(){if(!active)return;const p={image_id:S.colorExperiment.image_id,original_image_url:S.uploaded.originalImageUrl,target_region_id:active.id,original_hsl:active.hsl,new_hsl:{h:(active.hsl.h+Number($('h').value)+360)%360,s:Math.max(0,Math.min(100,active.hsl.s+Number($('s').value))),l:Math.max(0,Math.min(100,active.hsl.l+Number($('l').value)))}};const b=await (await fetch(API+'/recolor',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)})).json();const im=new Image();im.src=b.preview_image_url;im.onload=()=>{$('previewCanvas').getContext('2d').drawImage(im,0,0)};S.colorExperiment.last=b;}
['h','s','l'].forEach(id=>$(id).oninput=doPreview);
$('saveSwatch').onclick=()=>{S.colorExperiment.history.push({region:active&&active.name,h:$('h').value,s:$('s').value,l:$('l').value});$('history').innerHTML=S.colorExperiment.history.map(x=>`<li>${x.region}: H${x.h}/S${x.s}/L${x.l}</li>`).join('')};
$('analyzeColor').onclick=async()=>{const p={original_color_regions:regions,adjusted_color_regions:regions,before_image_url:S.uploaded.originalImageUrl,after_image_url:(S.colorExperiment.last&&S.colorExperiment.last.preview_image_url)||S.uploaded.displayUrl};const b=await (await fetch(API+'/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)})).json();$('colorFeedback').innerHTML=DOMPurify.sanitize(marked.parse(b.learning_explanation||b.summary||''));};
let stage,kLayer,selected,layerNodes=[];
function op(type,id,d){S.compositionExperiment.operations.push({type,layer_id:id,description:d});$('ops').innerHTML=S.compositionExperiment.operations.map(x=>`<li>${x.description}</li>`).join('')}
$('startComp').onclick=async()=>{const b=await (await fetch(API+'/layers/decompose',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({image_url:S.uploaded.displayUrl,max_layers:8})})).json();S.compositionExperiment={...b,operations:[]};stage=new Konva.Stage({container:'stage',width:b.canvas.width,height:b.canvas.height});kLayer=new Konva.Layer();stage.add(kLayer);layerNodes=[];for(const l of b.layers){const im=new Image();im.src=l.layer_url;await new Promise(r=>im.onload=r);const n=new Konva.Image({image:im,x:l.transform.x,y:l.transform.y,draggable:true,name:l.id});n.on('dragend',()=>op('move',l.id,`你移动了元素 ${l.id}`));n.on('transformend',()=>{op('scale',l.id,`你缩放了元素 ${l.id}`);op('rotate',l.id,`你旋转了元素 ${l.id}`)});n.on('contextmenu',e=>showMenu(e.evt.clientX,e.evt.clientY,n,l));kLayer.add(n);layerNodes.push({def:l,node:n})}const tr=new Konva.Transformer();kLayer.add(tr);stage.on('click',e=>{if(e.target===stage)return;selected=e.target;tr.nodes([selected]);$('menu').style.display='none'});kLayer.draw();$('comp').classList.remove('hidden')};
function showMenu(x,y,node,def){const m=$('menu');m.style.left=x+'px';m.style.top=y+'px';m.style.display='block';const items=[['置于顶层',()=>{node.moveToTop();op('bring_to_front',def.id,`你将元素 ${def.id} 置于顶层`)}],['置于底层',()=>{node.moveToBottom();op('send_to_back',def.id,`你将元素 ${def.id} 置于底层`)}],['上移一层',()=>{node.moveUp();op('z_order_up',def.id,`你上移了一层 ${def.id}`)}],['下移一层',()=>{node.moveDown();op('z_order_down',def.id,`你下移了一层 ${def.id}`)}],['水平镜像',()=>{node.scaleX(Math.abs(node.scaleX()));node.setAttr('flip_x',!node.getAttr('flip_x'));op('flip_x',def.id,`你水平镜像了元素 ${def.id}`)}],['垂直镜像',()=>{node.scaleY(Math.abs(node.scaleY()));node.setAttr('flip_y',!node.getAttr('flip_y'));op('flip_y',def.id,`你垂直镜像了元素 ${def.id}`)}],['隐藏图层',()=>{node.visible(false);op('hide',def.id,`你隐藏了元素 ${def.id}`)}],['删除图层',()=>{node.destroy();op('delete',def.id,`你删除了元素 ${def.id}`)}],['重置该元素',()=>{node.position({x:def.transform.x,y:def.transform.y});node.scale({x:1,y:1});node.rotation(0);node.setAttr('flip_x',false);node.setAttr('flip_y',false);node.visible(true);node.opacity(1);op('reset',def.id,`你重置了元素 ${def.id}`)}]];m.innerHTML=items.map((it,i)=>`<button data-i='${i}'>${it[0]}</button>`).join('');m.querySelectorAll('button').forEach(b=>b.onclick=()=>{items[Number(b.dataset.i)][1]();kLayer.draw();m.style.display='none'})}
$('saveComp').onclick=async()=>{const konvaImgs=kLayer.getChildren(node=>node.className==='Image');const layers=konvaImgs.map((n,i)=>{const m=layerNodes.find(v=>v.node===n);return {id:m.def.id,layer_url:m.def.layer_url,x:n.x(),y:n.y(),scale_x:Math.abs(n.scaleX()),scale_y:Math.abs(n.scaleY()),rotation:n.rotation(),flip_x:!!n.getAttr('flip_x'),flip_y:!!n.getAttr('flip_y'),visible:n.visible(),opacity:n.opacity(),z_index:i+1}});const p={image_id:S.compositionExperiment.image_id,background_url:S.compositionExperiment.background_url,layers,operations:S.compositionExperiment.operations};const b=await (await fetch(API+'/layers/compose',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)})).json();S.compositionExperiment.workingImageUrl=b.after_image_url};
$('analyzeComp').onclick=async()=>{const p={before_image_url:S.uploaded.displayUrl,after_image_url:S.compositionExperiment.workingImageUrl||S.uploaded.displayUrl,layers_before:S.compositionExperiment.layers,layers_after:[],operations:S.compositionExperiment.operations,user_goal:'用于形式构成课程实验'};const b=await (await fetch(API+'/composition/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)})).json();const md=`### summary\n${b.summary}\n### composition_change\n${b.composition_change}\n### visual_focus_analysis\n${b.visual_focus_analysis}\n### layer_order_analysis\n${b.layer_order_analysis}\n### spatial_relationship_analysis\n${b.spatial_relationship_analysis}\n### learning_explanation\n${b.learning_explanation}\n### suggestions\n${(b.suggestions||[]).map(s=>'- '+s).join('\n')}`;$('compFeedback').innerHTML=DOMPurify.sanitize(marked.parse(md));};
</script></body></html>
